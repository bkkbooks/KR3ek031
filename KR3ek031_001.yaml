body:
  text: 青囊秘決上卷背癰論人有背心間先發紅瘰後漸紅腫此發背之兆也最為可畏古人云外大如豆內大如拳外大如拳內大如盤言其外小而內實大也然而癰疽等毒必先辨其陰陽有先陰而後陽者有先陽而後陰者有先後俱陰者有先後俱陽者陽症雖重而實輕陰症雖輕而實重先陰而變陽者生先陽而變陰者死病症既殊而何以辨之也陽症之形必高突而腫起陰症之形必低平而陷下陽症之色必純紅陰症之色必帶黑陽症之初起必痛陰症之初起必癢陽症之潰爛必多膿陰症之潰爛必多血陽症之收口身必輕爽陰症之收口身必沉重至於變陰變陽亦以此消息之斷斷不差矣倘見紅腫而高突者乃陽症之癰也乘其內毒初起毒尤未化急以敗毒之藥治之可隨手而解也發背而至於橫決者皆因循失治以至於破敗而不可救陽變陰者多矣救癰如救火宜一時撲滅否則延燒屋廬不盡不止切勿視為陽症無妨而輕緩治之也方用急消湯忍冬藤二兩紫花地丁一兩天花粉三錢桔梗三錢青蒿三錢甘草三錢茜草三錢甘菊花三錢貝母二錢黃柏一錢水煎服一劑輕二劑又輕三劑全消不必四劑也此方消陽毒之初起者最神既無迅烈之虞又有和解之妙世人不知治法謂陽毒易於祛除孟浪用虎狼之藥雖毒幸消散而真元耗損於無形往往變成別病乃醫者成之也何若此方王霸並施有益無損之為妙哉秘訣背癰急消兩地丁花粉三錢與桔梗蒿草茜菊同上用忍冬二兩齊煎沖貝母二錢錢黃柏初起三劑見奇功方用神散陽癰湯亦效車前子五錢貫眾五錢甘草五錢天花粉五錢赤茯苓五錢生地一兩柴胡一錢羌活二錢黃芩三錢紫菀三錢水煎服一劑消大半二劑全消矣秘訣神散陽癰陽痘用急投車前與貫眾甘粉赤苓各五錢生地一兩柴錢攻羌活二錢芩菀三服止兩劑可奏功人有背心發瘰癢甚已而背腫如山者隱隱發紅暈如盤之大此陰癰初起之形象也最為可畏非前症陽癰可比蓋陽症有可救之術而陰豈無可生之理亦在救之得法否耳蓋陰癰之症必正氣大虛邪得而入之也設正氣不虛邪將安入故救陰癰之症必須大用補氣補血之藥而佐之散郁散毒之品則正旺而邪自散矣方用變陽湯金銀花八兩人參二兩黃耆二兩附子一錢黑荊芥三錢天花粉五錢甘草五錢白芍一兩柴胡二錢水十碗煎汁二碗先服一碗後少緩再服一碗服後陰必變陽而作痛再一劑而痛亦消再服一劑而痊愈竟消滅於無形也然而世人不至皮破血流斷不肯信誰能用此等之藥以治發背之陰癰乎無論病人不肯服即醫生亦不肯用或醫生知用此治療而病人之家亦不肯信往往決裂潰爛瘡口至如碗大而不可收拾始追悔參耆之遲用晚矣余所以既論此證又多戒辭勸人早服此方萬不可觀望狐疑以喪人命也蓋陽毒可用攻毒之劑而陰毒須用補正之味此方用人參黃耆以補氣氣旺則陰幽之毒不敢入心肺之間而金銀花性補善解陰毒得參耆而其功益大然非得附子則不能直入陰毒之中而又出陰毒之外毒深者害深又益以甘草以解其毒然而毒結於背者以氣血之壅也壅極者郁之極也故加柴胡荊芥白芍天花粉之類消其痰而通其滯開其鬱而引其經自然氣宣而血活痰散而毒消矣秘訣變陽陰疽初起方銀八參耆二附錢荊芥三錢炒黑用花粉五錢同在甘白芍一兩柴二錢變陽三劑自無難此症用錦庇湯亦效茯苓一兩甘草一兩黃耆三兩黑荊芥三錢天花粉三錢肉桂三錢貝母二錢錦地羅五錢水煎服一劑而散大半三劑痊愈秘訣氣血壅滯用錦庇苓草一兩三兩耆荊芥粉桂各三錢貝母二錢研去心地羅五錢同煎服三劑陰毒去十分人有背癰潰爛洞見肺腑瘡口黑陷身不能臥口渴思飲者人以為陽症之敗壞也誰知是陰虛而不能變陽乎夫背癰雖有陰陽之分及至潰爛之後宜補內而不宜消外則陰陽之症一也潰爛而至於肺腑之皆見此乃從前失補之故使毒蘊而延燒將好肉盡化為瘀肉耳肉瘀自必成為腐肉而腐則必洞見底黑此等症候九死一生之兆也倘胃氣健而能食者猶可救療倘見食即惡者斷無生理雖然能用參耆歸熟亦往往有可生者正不可棄之而不救也方用轉敗湯金銀花四兩白朮四兩肉桂三錢遠志三錢茯苓三錢熟地二兩人參二兩黃耆二兩麥冬二兩當歸一兩山茱萸二兩五味子一錢水煎服一劑而胃氣大開者即可轉敗為功也倘飲之而稍能健飯亦在可救惟飲之而杳無應驗者是胃氣已絕也不必再治之矣或飲之而飽悶少頃而稍安者亦有生機此方補其氣血而更補其肺腎之陰蓋陰生則陽長陰陽生長則有根易於接續而後以金銀花解其餘毒則毒散而血生血生而肉長肉長而皮合必至之勢也倘日以解毒為事而不補氣血之陰陽則陰毒不能變陽有死而已可勝悲嘆哉泌訣背癰危症轉敗湯銀花白朮四兩嘗桂志茯苓各三錢二兩熟地參與黃麥冬山萸量同上歸兩味錢一劑良此症方用變陽湯亦可效黃耆三兩當歸二兩山藥二兩肉桂五錢半夏三錢人參一兩茯苓一兩錦地羅五錢甘草三錢水煎服四劑愈秘訣陰毒不起變陽湯三兩黃耆二兩當二兩山藥五錢桂三錢半夏草同嘗一兩參苓五錢錦四劑毒化病自康人有背癰將愈而瘡口不收百藥敷之絕無一驗者人以為餘毒之未盡也誰知是陰虛而不能濟陽乎夫癰疽初起則毒盛變膿則毒衰膿盡則毒化矣瘡口之不收者乃陰氣之虛非毒氣之旺也世人不知治法尚以敗毒之藥攻之是已虛而益使之虛也欲求肌肉之長何可得乎然亦有用補法治之而未效者何也以但用陽分之藥以補其陽而不用陰分之藥以補其陰故也蓋獨陰不長而獨陽亦不生也凡癰疽至膿血已淨則陰必大虛若止補其陽則陽旺陰虛陰不能交於陽矣雖陽有濟陰之心而陰無濟陽之力所以愈補陽而陰愈虛則瘡口愈難合矣治之法必須大補其陰使陰精盛滿自然能灌注於瘡口之中不用生肌外敷之藥而瘡口之肉則內生矣方用生膚散人參五錢焦白朮五錢熟地二兩肉桂一錢忍冬藤一兩麥冬一兩當歸一兩山茱萸一兩水煎服二劑而肉自長又二劑而瘡口自平又二劑而痊愈矣此方補陰之藥多於補陽使陰勝於陽也然而補陽之藥仍是補陰之助以其能入於陰之中而交於陽之內也忍冬藤非特其能解餘毒尚取其能領諸藥至於瘡間也秘訣瘡口不收生膚散人參焦術整五錢二兩熟地一錢桂忍冬麥歸一兩山水煎連來六劑服生肌長肉自不難此症方用收肌飲亦效白朮二兩熟地二兩人參一兩山茱萸一兩麥冬一兩當歸一兩甘草三錢肉桂三錢菊花三錢花粉三錢水煎服切戒房事一月否則變生不測矣秘訣收肌二兩術熟地一兩參萸麥當歸草桂菊花各三錢花粉三錢服四劑人有背癰長肉瘡口平滿忽然開裂流水者人以為瘡口之肉未堅也誰知是色欲惱怒之不謹乎大凡瘡癰之症最忌者房事其次者惱怒也犯惱怒者新肉有開裂之虞犯房事者新肉有流水之患然此猶些小之瘡節也其在背癰犯惱怒者不過疾病而犯房事者必致死亡其瘡口開裂者必然色變紫黑而流水者必然肌肉敗壞矣當是時必須急補氣血萬不可仍治其毒蓋前毒未盡斷難收口既經收口復至朽壞實新肉不堅而自決裂也況發背新愈之後其精神氣血盡皆空虛所以交合泄精遂至變出非常舍補氣血又安求生再活乎然而即補氣血以些小之劑欲收危亂之功無異大廈傾頹豈一木所能支哉故又須大劑補之而後可方用定變回生湯人參四兩黃耆三兩山茱萸一兩茯苓一兩忍冬藤二兩麥冬二兩白朮二兩當歸二兩五味子三錢肉桂二錢水煎服一劑而肉不腐二劑而肉生三劑而皮合四劑而瘡口平復矣切戒再犯再犯無不死者即再服此方亦無益也可不慎乎此方實救瘡瘍壞症之仙丹不止療發背愈後犯色怒之敗腐也人疑泄精以致決裂宜用熟地以大補之何故反置而不用以熟地補陰最緩而症犯實急所以舍熟地而用氣血之藥急拯其危非熟地不可用而輕棄之也此方服數劑之後各宜減半而多加熟地以為善後之計可耳秘訣怒欲瘡裂回生方人參四兩耆三兩萸苓一兩桂二錢忍冬麥術二兩當五味三錢四平復再犯色戒定不長此症湯用補縫飲亦佳人參二兩熟地二兩白朮二兩當歸一兩麥冬一兩山藥五錢肉桂二錢附子一錢白芍五錢五味子三錢水煎服十劑愈秘訣前方既用服此藥參朮熟地二兩著歸麥一兩藥五錢桂二附一五錢芍惟有五味用三錢服之十劑可安樂人有夏月生背癰瘡口不起脈大無力發熱作渴自汗盜汗方用參耆大補之劑更加手足逆冷大便不實喘促嘔吐者人以為火毒太甚也誰知是元氣太虛補不足以濟之乎夫癰分陰陽瘡口不起者乃陰症而非陽症也脈大似乎陽症大而無力非陰而何發熱作渴此水不足以濟火故隨飲隨汗也既是陰症似陽用參耆陽藥以助陽正氣足以祛陰而返陽矣何以愈補而反作逆冷嘔吐之狀也此陰寒之氣甚盛而微陽之品力不能勝耳非助之以附子辛熱之品何能斬關入陣以滌盪其陰邪哉方用助陽消毒湯人參八兩黃耆一斤當歸四兩白朮四兩附子五錢陳皮五錢水煎成膏分作兩次服凡自汗盜汗逆冷嘔吐諸症俱可頓除連服數劑瘡起而潰減半又用數劑而愈此方非治癰之法也然以治癰之法而輕治此等之症鮮不立亡可見治癰而不可執也大約陽癰可服消毒化疾之藥而陰癰不可用消毒化痰之藥舍癰從症實治癰之變法醫者不可不知也秘訣夏月喘促背生瘡盜汗冷逆方無陽急取消毒參八兩一斤黃耆四兩當白朮亦四附五錢陳皮二劑分服康此症方用起陷丹亦效人參二兩白朮二兩熟地二兩附子一錢當歸一兩麥冬一兩五味子三錢肉桂二錢山藥五錢白芍五錢水煎服連服十劑愈秘訣補虛起陷用參朮二兩熟地一錢附歸麥一兩味三錢肉桂二錢山芍五若能一連服十劑瘡口下陷患自除人有背生癰疽潰爛之後或發熱或惡寒或作痛或膿多或流清水自汗盜汗膿成而不潰口爛而不收人以為毒氣之未盡也誰知是五臟虧損氣血太虛之故乎凡人氣血旺盛陰陽和平何能生毒惟其臟腑內損而後毒氣得以內藏久之外泄及至瘡癰發出其毒自不留內然而臟腑原虛又加流膿流血則已虛而益虛矣觀其外而瘡口未斂似乎有餘審其內而氣血未生實為不足治之法當全補而不宜偏補恐臟腑致有偏勝之虞也方用十全大補湯最妙以其合氣血而全補之耳然而用之往往不救者非方之不善也乃用方之不得其法耳夫背癰何等之症豈尋常細小之劑所能補之乎故必須多其分兩大劑煎服始克有應驗之效余因酌定一方以求正於同人人參一兩當歸一兩黃耆二兩熟地二兩白芍五錢茯苓五錢白朮五錢肉桂二錢川芎三錢甘草三錢水煎服一劑有一劑之效也世疑此方絕不敗毒如何化毒而生肉也不知癰疽未潰之前以化毒為先既潰之後以補正為急即有餘毒未盡不必敗毒也蓋敗毒之藥非寒涼之品即消耗之味也消耗則損人真氣寒涼則損人胃氣真氣損則邪氣反盛胃氣傷則穀氣全無何能生肌長肉哉惟十全大補湯專補真氣以益胃氣故能收全效耳且此方不特治背癰之未潰即瘡瘍之已潰者皆宜用之惜世人未知之也秘訣還有人參一兩當黃耆熟地整二兩白芍茯苓朮五錢桂二芎草三錢當此是十全大補劑自然毒化氣血剛此症或疑十全大補湯無化毒之品又有加減十全大補湯亦可用備載於後人參一兩白朮一兩當歸一兩熟地一兩麥冬一兩甘草三錢五味子三錢錦地羅三錢茯苓五錢黃耆二兩水煎服秘訣加減大補亦妙方參朮歸地麥兩襄甘味地羅俱三錢茯苓五錢耆二兩肺癰論人有胸膈之間作痛咳嗽之時更加痛極手按痛處尤增氣急者人以為肺經生癰也誰知是肺熱以成癰乎夫肺為嬌臟藥石之所不能到者也故為治甚難肺受熱害既已成癰將何法以療之乎治之法似宜瀉火以救肺然而肺藥不可入而肺之母為脾脾經未嘗不受藥也肺之克為肝肺之賊為心二經未嘗不受藥也補其脾經之土則土能生金也平其肝經之木則金不能剋木也清其心經之火則火不來刑金也三經皆有益於肺而無損乎金則肺氣得養而後以消毒之品直解其肺中之邪何患肺癰之不治乎方用完肺湯金銀花五兩麥冬二兩玄參三兩甘草五錢天花粉三錢茯苓三錢白芍三錢水煎服一劑而痛減二劑而內消矣大凡肺癰之症必須內消而不可令其出毒內消之法總不外脾肝心三經治之而別無求消癰之道也或曰肺之子腎也獨不可治腎以消癰乎不知肺癰之成雖成於火爍肺金之液實因肺氣之自虛也補腎雖能使肺氣不來生腎惟是肺腎相通補腎之水恐肺氣不降而火毒反不能速散不若止治三經使肺氣得養自化其毒不遺於腎之為妙也秘訣肺金生癰五兩金麥冬二兩三玄參甘草五錢三花粉茶芍亦然癰自泯此症方用地羅甘桔玄參湯亦效麥冬二兩玄參二兩甘草一兩錦地羅一兩桔梗五兩貝母五錢水煎服二劑愈秘訣又有二兩麥玄參一兩甘草一兩錦桔梗貝母五錢研二劑毒化妙如神人有胸膈作痛咳嗽吐痰更覺疼痛手按痛處痛不可忍咽喉之間先聞腥臭之氣隨吐膿血此肺癰不獨已成而且破矣夫肺癰未破者易於消已破者難於治以膿血未能遽消耳然治之得法亦不難也蓋肺之所以生癰者因肺之火不散也然肺火之來因肺氣之虛也肺虛而後火留於肺火盛而後肺結為癰不補虛而散火而未成形者何以消已成形者何以散即潰爛者又何以愈哉是虛不可不補而補虛者將補何臟乎必須補肺氣之虛而肺不能直補其氣補脾胃之虛則肺氣自旺矣今癰已破矣多吐膿血則肺氣愈虛雖毒氣猶存不可瀉其毒氣於補氣之中而行其攻散之法則毒易化而正氣無傷也方用完肺湯金銀花二兩人參二兩玄參二兩天花粉三錢蒲公英五錢甘草三錢桔梗三錢黃芩一錢水煎服一劑而膿必多二劑而膿漸少三劑而痛輕四劑而又輕五劑而疼痛而膿血亦止也六劑而奏全功矣此方補胃中之氣而即瀉胃中之火胃氣旺而肺氣自不能衰胃火衰而肺火自不能旺所以既能敗毒又能生肉耳雖諸藥不單走胃然入胃者十之八入肺者十之二仍是治胃以治肺也或問肺癰已破病已入里似不宜升提肺氣喻氏辨證錄作南昌喻嘉言謂宜引之入腸而先生仍用桔梗以開提肺氣恐不可為訓嗟乎余所用之藥無非治胃之藥藥入於胃有不下引入腸者乎然而肺氣困頓清肅之令不行用桔梗以清肺上氣通而下行更速是則上之開提下之迅速可斷言矣秘訣肺癰已破銀花參玄參二兩粉三錢蒲公五錢甘桔三黃芩一錢一同煎二劑三劑膿漸止服至六劑癰自痊方用肺癰救潰湯亦神效玄參一兩蒲公英一兩金銀花四兩紫花地丁五錢菊花五錢甘草五錢陳皮五錢黃芩三錢桔梗三錢款冬花三錢水煎服七劑愈秘訣消癰救潰參蒲銀地丁菊甘五錢陳芩桔款冬三錢入水煎七劑癰回春人有久嗽之後肺管損傷皮膚黃瘦咽喉雌啞自汗盜汗臥眠不得口吐稠痰腥臭難聞惟聞喘急毛悴色焦喘嗽之時必須忍氣須臾輕輕吐痰始覺膈上不痛否則大痛難堪氣息奄奄全無振興之狀者人以為肺中癰也誰知是肺痿而生瘡乎此等之症不易解救然治之得法調理又善亦有生者夫肺癰與肺痿不同肺癰生於火毒治之宜速肺痿成勞傷治之宜緩大約火毒當補中而用瀉勞傷宜補中而帶清瀉與清不同而補亦不同惟是瀉中用補可用大劑清中用補當用小劑勿忘勿助若有若無始能奏功也方用養肺去痿湯麥冬三錢金銀花三錢紫菀五分百部五分甘草五分生地二錢百合二錢天冬一錢款冬花一錢貝母一錢白薇三分水煎服服十劑而膈上痛少輕者便有生機矣再服十劑而更輕再服十劑而漸愈共服五十劑而始痊愈也此方不寒不熱養肺氣於垂絕之時保肺痿於將棄之頃實有奇功倘求捷效於一旦必至輕喪於須臾寧忍耐以全生切勿欲速而送死也秘訣養肺救痿麥三銀紫菀百部草五分生地百合二錢著天冬一錢款貝存白薇三分水煎服服五十劑病回春起痿延生丹亦效款冬花五分百部五分白薇五分山豆根五分甘草一錢桔梗一錢生地五錢天花粉五錢麥冬五錢玄參二錢天冬一錢水煎服連服十劑愈秘訣起痿延生款五分百部白薇山豆根甘桔一錢生地粉麥冬五錢二玄參天冬一錢勞傷去連服十劑漸回春世有膏粱子弟多食濃厚氣味燔炙煎炒之物時時吞嚼或美醞香醪乘興酣飲逐至咽乾舌燥吐痰吐血喘息膈痛不得安眠者人以為肺經火熱也誰知是肺痿已成瘡乎夫肺為五臟之蓋最喜清氣之熏蒸最惡燥氣之炎逼今所飲所食盡為辛熱之物則五臟之中全是一團火氣火性炎上而肺金在上安得不受其害乎肺既受刑不能下生腎水腎水無源則腎益加燥勢必取資於肺金而肺金又病能不已虛而益虛已燥而益燥乎況各經紛紛來逼火烈金燥肺間生癰必然之勢也治之法化毒之中益以養肺降火之中濟以補腎庶幾已成者可痊未成者可散也方用扶桑清肺散金銀花一兩熟地一兩阿膠三錢桑葉五錢紫菀二錢甘草二錢人參三錢貝母三錢百合三錢杏仁十枚款冬花一錢犀角末五分水煎服調犀角末服數劑可奏功也此方肺腎同治全不降火蓋五臟之火因飲食而旺乃虛火上升而非實火也故補其腎而肺氣堅腎水足而虛火息矣況補中帶散則補非呆補則火毒更易解也秘訣肺痿扶桑清肺散銀熟一兩阿膠三桑葉五錢菀草二參貝百合用三錢杏仁十枚款錢重犀角五分沖服安方用銀花甘桔湯亦效丹皮一兩金銀花一兩生地一兩玄參一兩甘草三錢桔梗三錢貝母三錢水煎服四劑痛減再用減半藥料服數劑而痛乃止秘訣銀花甘桔丹皮金生地一兩與玄參甘桔貝母三錢服四劑減半再留心無名腫毒論人有頭面無端忽然生小瘡甚癢第二日即頭重如山第三日即面目青紫人多不知此症乃至險至危若不急救數日內必然一身發青而死但青不至胸者尚可治療因其人素服房中熱藥熱極而變為毒也結於陰之部而成癰結於陽之部而成毒出於頭面者乃陽之部位也較之生於陰之部位者更為可畏非多用化毒之藥安能起死回生者哉方用回生丹金銀花八兩甘草五錢玄參三兩蒲公英三兩天花粉三錢川芎一兩水煎服一劑而頭輕青紫之色淡矣再服一劑青紫之色盡消而瘡亦愈不必三劑也此方化毒而不耗氣敗毒而不損陰所以建功甚奇也此毒原系水虧之極而泄毒之藥無不有損於陰陽惟金銀花攻補兼妙故用以為君若少用其味單而力薄多用則味重而力厚又加玄參以去火甘草以瀉毒蒲公英以清熱天花粉以消痰川芎以散結自然相助而奏效也秘訣無名腫毒回生丹銀花八兩草五錢玄參蒲公三兩整花粉三錢芎兩添一劑腫毒盡消去二劑痊愈效如仙方用花錦散亦效錦地羅八兩金銀花八錢當歸二錢天花粉五錢甘草五錢水煎服一劑效再續服秘訣花錦散用錦地羅銀八二當粉五挪五錢同粉有甘草一劑回生效無訛人有無名腫毒生於思慮不到之處而形勢凶惡有生死之關皆可以無名腫毒名之不必分上中下也前條止言頭面而在身之左右前後與手足四肢尚未言也不知得其治法無不可以通治不得其法不可妄治失其治法則害大矣然在上者不可以治中在中者不可以治下在下者不可以治上中也大約上中下之生毒多起於淫欲無度之人加之以氣怒憂憤火乘其隙而蘊故一發而不可制所以言無名腫毒者盡陰症而絕無陽症也然則治之法宜用解陰毒之藥矣惟是解陰毒之藥多半消爍真陰因虛而結毒復因解毒而虧陰寧有陰乎世之患是症者往往不救職是故也余得異人之傳仍於補陰之中而行其散郁之法少佐解毒之品而微助其引經之味是以多收奇功余不敢秘傳之書冊以救萬世之人也方用黑虎湯玄參一斤甘草一兩柴胡三錢三味煎湯十碗為善若頭面腫毒者加川芎一兩附子二錢生於身前後左右者加當歸一兩菊花一兩附子三分生於手足四肢者加白朮二兩茯苓二兩附子五分入藥湯中再煎汁取三碗二日服完未破者立消已破者生肌不必二劑也此方名黑虎湯言惡毒得之盡散也玄參能退浮游之火得甘草之助能解其迅速之威得柴胡之輔能舒其鬱結之氣且又各有引經之味引至結毒之處大能為之祛除妙在玄參一斤則力量更大又妙在補中帶散則解陰毒而不傷陰氣所以奏功最神萬勿驚其藥料之重而不敢輕試也若些小之症又非陰毒俱不必用此重劑則又不可不知也秘訣黑虎湯中一兩甘三錢柴胡一斤玄若是頭面腫毒者川芎一兩附二錢生身前後左右者歸菊一兩附子添手足四肢術二兩茯苓二兩附五煎方用七聖湯亦治之蒲公英四兩紫花地丁四兩金銀花四兩錦地羅四兩當歸三兩天花粉五錢甘草四錢水煎服秘訣七聖湯用蒲地丁銀錦四兩歸三從粉五甘草四錢入陰毒輕症急煎攻對口瘡論人有對口之後忽生小瘡先癢後痛隨至潰爛人以為至凶之癰也然而癰生正對口者猶輕生於偏對口者乃重蓋頸項之上乃腎督脈之部位也其地屬陰所生癰疽多屬陰癰而非陽疽也以陽症必高寸許其色紅腫發光疼痛呼號而陰症則不然色必黑暗痛亦不甚身體沉重困倦欲臥呻吟無力其瘡口必不突起或現無數小瘡口人皆不知從何處覓頭然陰陽二毒皆可內消何必令其皮破腫潰而後治之哉至於內消之法初起之時不須分別陰陽可俱用三星湯惟既破潰腸陰陽不分而漫投藥餌則禍生頃刻矣若陽症潰爛仍以三星湯治之若陰症潰爛者則須用神效湯三星湯金銀花二兩蒲公英一兩甘草三錢水煎服未破者服之可消已破者三劑膿盡而肉生矣秘訣三星湯可治陽癰二兩銀花一兩英甘草三錢服三劑自然膿盡好肉生神效湯當歸一兩黃耆一兩人參一兩金銀花二兩白芍一兩肉桂一錢荊芥三錢水煎服一劑而血止二劑而肉生三劑而口小四劑而皮合再服二劑而痊愈矣此方治各處癰毒凡低陷不作膿而不能收口者急服此藥無不神效不止治對口之陰毒善能收功也誠以陽症可以涼瀉陰症必須溫補故耳秘訣神效湯中歸耆參一兩白芍二兩金桂一荊三水煎好陰癰六劑可回春方用三花湯亦效川芎一兩紫花地丁一兩當歸二兩菊花五錢天花粉三錢水煎服二劑愈秘訣癰不作膿三花湯芎紫一兩二兩當甘菊五錢三花粉止服二劑妙無雙對口有偏正之不同發於正者是督脈所生偏者乃太陽膀胱所司督脈行於下而貫脊行於上毒氣得之反能衝突高起邪毒不致下流乃為外發故易治由膀胱發者難治以膀胱之脈起於巔頂貫脊兩旁順下而行與癰毒交會下流故瘡多平塌難起不發紅腫潰爛易流注於兩肩而作腫十五日無膿者必然變陽歸陰故多難治也腦疽論人有生癰疽於頭頂者初名腦疽又名偏正對口而非真正癰疽也此症九死一生然治之得法亦可救也大約生此症者皆因腎火沸騰也蓋腦為髓海原通於腎腎無火則髓不能化精腎火盛則髓亦不能化精不特不能化精隨火之升降則化為毒而生癰疽矣蓋腎之化精必得腦中之氣以相化若腦中無腎火勢必氣化為火火性炎上不及下降於是腦中髓海自化為毒較之腦氣下流而成毒者其毒更甚往往更變形容改變聲音瘡色紫黑口乾煩躁隨飲隨渴甚者腦骨俱腐片片脫落其狼狽之狀莫可形容將何以救之耶此症治法須問其飲食如何倘飲食知味尚可以救方用五靈湯玄參三兩麥冬三兩金銀花八兩黃耆四兩人參二兩水煎服連服四劑其癰疽漸愈改用十全大補湯重四兩服四劑又改用八味地黃湯恣其酣飲可獲痊愈矣此症十有九死然而余立一法實無第二法也此症得於房勞者居多興陽澀精俱是丹石燥烈之品或洗或嚼或含於口或納於臍霸阻精道久戰不已日積月累真陰枯澀髓竭火發遂潰頂門多致不救人何苦貪婦人之歡以千金之命而輕於夜臺也秘訣頂上生疽用五靈三兩玄參及麥冬銀花八兩黃耆四人參二兩四劑功此症用蔓花湯亦效玄參二兩山茱萸二兩金銀花二兩川芎一兩貝母三錢蔓荊子三錢水煎服一劑即消二劑痊愈秘訣腦癰蔓花用元參二兩山萸二兩金川芎一兩三錢貝蔓荊子二效如神囊癰論人有陰囊左右而生癰毒者名曰便毒生於腎囊之下穀道之前名曰囊癰二者之間便毒易治而囊癰難療也以囊之下為懸癰其皮肉與他處不同蓋他處皮肉或橫生或直生俱易合而懸癰之處橫中有直直中有橫一有損傷不易收功然治之得法未嘗難也此等之症皆少年貪於酒色或入花街而酣戰或入柳巷而恣歡往往多生此瘡者所謂欲泄不泄精化為膿血是也治之法必須大補其虛而佐以化毒之品以毒因虛而成不治乎虛癰安得痊方用逐邪至神丹金銀花四兩蒲公英二兩當歸二兩大黃五錢人參一兩甘草一兩天花粉二錢水煎服一劑而毒消二劑而痊愈潰者三劑可以收功矣此方用銀花公英佐之歸參大黃之大料未免過於伯霸道況大虛之病又用大黃以祛逐似乎非宜誰知毒氣甚盛乘其初起之時正氣未衰而大補大瀉之為得乎倘因循失治或畏縮而不敢治及治流膿出血正氣蕭索始用參耆補氣往往有用至數斤而尚未能復元何若早用於化毒之中正氣無傷而毒又易散哉此因勢利導之法又不可不知也秘訣逐邪神丹銀四兩二蒲歸兮五大黃一兩參草二錢粉水煎三劑消癰囊方用八聖丹治之亦效金銀花四兩歸尾一兩人參二兩柴胡三錢黃芩三錢黃柏三錢貝母三錢梔子三錢水煎服一劑輕二劑效毒已出即可勿服秘訣八聖丹中四兩金一兩當歸二兩參柴胡芩柏三錢入貝梔亦然研去心人有飲酒入房精不得瀉至半夜煩熱煩渴小便淋赤痰涎湧盛第一日陰囊腫脹焮痛明日陰囊處肉腐玉莖下帖囊者亦腐人以為酒毒也誰知是肝火得酒濕而肆瘧乎夫酒濕何至腐爛蓋火酒大熱之物也人過飲火酒多致醉死死後往往身體腐爛乃火酒之毒也治之法解酒毒而補氣血則濕熱祛而腐肉可長患可愈矣方用救腐湯人參一兩白朮一兩當歸二兩黃耆二兩茯苓五錢玉米五錢白芍一兩黃柏二錢澤瀉二錢葛根二錢梔子二錢水煎服四劑腐肉脫而新肉生再服四劑囊莖悉平復矣夫酒毒成於拂抑平肝瀉火利濕解毒可也何以又用參耆歸術以補其氣血耶大凡氣血盛者力能勝酒縱酣飲而無礙服火酒而腐爛因火酒而結毒亦因氣血之衰力不能勝酒毒耳所以兩火相合遂至焚身腐肉若不急補氣血則酒毒難消而腐肉又何以能速生肌長肉哉秘訣參朮一兩二歸耆茯苓五錢並玉米白芍兩重二四劑黃柏澤葛二錢梔方用異寶散亦效茯苓一兩冰片三分黃柏五錢瓦草五錢青苔五錢兒茶五錢麝香八分樟腦三錢乳香二錢沒藥二錢為末撒於患處水無流出即不再腐矣秘訣又有異寶撒囊癰一兩茯苓三分冰黃柏瓦草各五錢青苔兒茶一樣同麝香八分樟三錢乳香沒藥二錢從臂癰論人有兩臂之間忽然生瘡而變成癰疽者亦陰癰也雖較頭面對口肩背上稍輕然治之不得其法亦能殺人必須辨其陰陽治之大約陽症必紅腫而疼痛則易治陰症必漫腫麻癢則難療陽症宜用三星湯一二劑則消陰症則不可用必須大補氣血而佐以消痰化毒之劑始能奏功豈可謂手足非心腹之疾不必補虛乎夫陰主靜而手足乃至動者也動而生陰疽則動變為靜亦非常之道也可不畏哉況動變為靜又趨陰之道也陽趨於陰則生近於死矣欲陽返陰易欲陰返陽難誰謂手足之癰而可小視之哉方用消癰還陽丹白朮一兩黃耆一兩人參三錢天花粉三錢當歸五錢金銀花二兩肉桂一錢乳香一錢甘草三錢水煎服一劑陰返陽而癢變痛二劑而痛如失三劑全消不必四劑也此方與神效湯辨證奇聞辨證錄作七聖湯相似而意各異神效湯內無乳香天粉能治潰爛長肉生肌此方治未潰者而能內消也加乳香天粉二味以攻中有擁衛之力耳秘訣還陽神丹治臂癰白朮黃耆一兩同參粉三錢歸五錢銀花二兩桂錢從乳香一錢三錢草陽症方可服三星此症用轉攻湯亦治之黃耆二兩甘草三錢貝母三錢當歸一兩白朮一兩肉桂一錢遠志五錢紫花地丁五錢水煎服秘訣轉攻湯中二兩耆甘貝三錢去心宜歸術一兩桂一錢五錢遠志地丁隨乳癰論人有乳上生癰先腫後痛寒熱往來變成瘍癰此症男女皆有而婦人居多蓋婦生子抱兒食乳偶然困睡兒以口氣吹之乳內之氣塞不通遂成乳疾此時若以解散之藥治之可隨手而愈倘因循失治而乳癰之症成矣男子則不然陽明胃火熾盛不上騰於口舌而中壅於乳房乃生此症乳癰不比他處之癰有陰陽之別故治法亦無陰陽之判但別其先後之虛實耳初起多為邪實潰爛乃為正虛也雖然邪之有餘仍是正之不足治宜補中散邪乃萬全之道正不必分先宜攻而後宜補也方用和乳湯當歸一兩蒲公英一兩貝母三錢天花粉三錢甘草二錢穿山甲一片水煎服一劑而乳通腫亦消矣不必二劑也此方用貝母花粉者消胃中之壅痰也壅散而乳房之氣通矣佐以公英山甲解其熱毒利其關竅自然不攻而毒散矣惟恐前藥過於迅速加當歸甘草補正和解則正無傷而邪自退何慮餘毒不行而變乳岩哉秘訣和乳一兩歸蒲公三錢貝母花粉同山甲一片二錢草服下一服乳房通此症用消化無形湯亦效金銀花一兩當歸一兩甘草三錢天花粉三錢通草一錢紫背天葵五錢水煎服一劑即消秘訣又有消化無形湯銀花一兩當歸行甘粉三錢通草一紫背天葵五錢良人有先生乳癰收口後不慎房事以致復行潰爛變成乳岩現出無數小口而瘡口更加腐爛似蜂窩之狀肉向外生終年累月不愈服敗毒之藥而愈甚人以為毒深結於乳房也誰知是氣血大虛乎夫乳癰成岩肉向外生而筋束乳頭則傷乳即傷筋也此症必須急救否則有筋弛難長之虞矣夫筋弛而又泄精泄精則損傷元氣安得不變出非常乎當失精之後即用補精填髓之藥尚不致如此之橫今既因虛而成岩復見岩而敗毒不已虛而益虛乎無怪其愈治而愈壞也治之法必須大補其氣血以生其精不必再瀉其毒以其病無毒可瀉耳方用化岩湯茜草根二錢白芥子二錢人參一兩忍冬藤一兩黃耆一兩當歸一兩白朮土炒二兩茯苓三錢水煎服連服二劑而生肉紅潤再服二劑而膿盡痛止又二劑漏管重長又二劑痊愈再二劑永不復發矣此方全在補氣補血而不事消痰化毒之治忍冬雖為消毒之藥其性亦補況入於補藥之中亦純乎補矣惟是失精變岩似宜補精乃不補精而止補氣血何也蓋精不可以速生補精之功甚緩不若補其氣血氣血旺則精生矣且乳房屬陽明之經既生乳癰未能多氣多血補其氣血則陽明之經既旺自然生液生精以灌注於乳房又何必復補其精以牽制參耆之功乎此所以不用生精之味耳秘訣化岩湯中茜草根二錢白芥一兩參忍冬耆歸亦一兩白朮二兩苓三錢方用延仁湯亦效人參一兩當歸一兩白朮一兩熟地一兩麥冬一兩山茱萸五錢甘草一錢陳皮五分水煎服四劑效秘訣乳岩宜用延仁湯參歸術地麥兩襄山萸五錢一錢草陳皮五分四劑良人有左乳忽腫如桃皮色不變又不痛身體發熱形容漸瘦人以為痰氣鬱結也誰知是肝氣之不舒乎夫乳屬陽明而乳癰宜責之陽明胃經余獨言肝者何也蓋陽明胃土最怕肝木之克肝氣不舒則胃氣亦不舒耳況乳又近於兩脅正肝之部位也與肝相遠尚退縮而不敢舒與肝為鄰亦何敢恣肆而吐氣哉氣不舒而腫滿之形成漫腫無頭不痛不赤正顯其畏懼也治之法不必治陽明之畏但治肝經之郁自然毒消腫解矣方用加味逍遙散柴胡二錢川芎一錢甘草一錢人參一錢當歸三錢白朮三錢半夏三錢茯苓三錢陳皮三錢瓜蔞仁三錢白芍五錢水煎服服十劑而內消去瓜蔞再服十劑不再發矣逍遙散善解肝氣之郁肝氣鬱解而胃氣自舒矣況益之瓜蔞半夏陳皮專能治胸中之積痰痰去則腫亦易消也秘訣逍遙加味二錢胡芎草人參一錢煮歸術夏苓陳三錢蔞仁亦三白芍五此症用歸芍二通湯亦效當歸一兩白芍五錢柴胡三錢木通一錢通草一錢枳殼二錢穿山甲一片山楂十個桃仁十粒花粉三錢水煎服二劑效繼續服秘訣歸芍二通治乳岩當歸一兩芍五錢柴粉三錢二通一枳殼山甲楂桃全婦人產後忽兩乳細小下垂過腹疼痛難忍人以為懸癰也誰知是胃經氣血之燥乎蓋胃為水穀之海而多氣多血之腑也夫產後亡血過多則胃中空虛而飲食不能遽進即進飲食而各臟腑取給於胃甚急則胃氣困矣胃氣困而胃血則燥矣胃血燥無以解各臟腑之紛爭且小兒又索母乳則內外取資於胃胃無以應乳房者胃之外廓也乳頭者胃之門戶也胃苦內之紛爭欲避出於外而不可得況小兒日夜吮咂則兩乳細小下垂以至於腹有外遁難藏入地無門之狀此倒懸切膚之痛至危之症也治之法急救胃氣而益之補血之味則胃氣潤而不燥胃氣和平自然分給於臟腑又何至外痛而倒懸哉方用解懸湯人參二兩川芎二兩當歸四兩荊芥三錢炮姜一錢麥冬一兩益母草三錢水煎服四劑而乳頭收再四劑痊愈矣此方用人參以生胃氣於無何有之鄉用當歸川芎以生新血於危急之地用荊芥益母草以解臟腑之紛爭得歸於經絡用麥冬炮姜者因陽明胃火之燥未免火動而延燒產後不宜寒涼之藥故用麥冬微寒之品少解其火勢之烈也秘訣乳垂疼痛解懸湯參芎二兩四歸襄荊芥三錢益母草炮姜一錢麥兩嘗此症方用玉漿丹亦效人參二兩玄參二兩麥冬二兩當歸一兩生地一兩麻黃一錢五味子一錢水煎服二劑效秘訣潤胃益氣是玉漿人參玄參麥二兩歸地一兩麻黃錢五味同麻二劑康肚癰論人有生癰於小肚之間斷無陽毒之症以其屬於陰之部位也陰位生陰毒之症似乎至重然治之得法一用陽藥立可成功無奈世人一見肚腹生瘡往往多用陰藥以消毒反致癰成難救之症良可憫也然余所謂陽藥者非散火祛風之藥乃補氣溫火之味耳蓋陰地而結成陰毒者乃虛寒之故也寒因虛而不行毒因寒而鬱結故用熱藥以祛寒自能寒解而毒散也方用祛寒救腹丹白朮三兩金銀花三兩茯苓三錢肉桂三錢附子一錢當歸五錢蛇床子五錢水煎服按辨證奇聞辨證錄當歸作二兩一劑而癰消矣倘已潰者三劑而膿盡肉生矣四劑痊愈此方用白朮為君專利腰臍之氣腰臍之氣利則下腹之部位盡利矣佐以金銀花蛇床子以祛其毒氣則毒氣易消矣然恐寒涼之藥不能直入故加附子肉桂斬關突圍而進也惟是桂附朮床俱是乾燥之品毒雖祛除未免耗血故用當歸陽中滋陰少制其燥則陰寒散而又無陽旺之虞所以既能奏功而又無後患也秘訣祛寒救腹術銀三苓桂三錢附一錢歸床五錢一服消已潰四劑妙如仙此症方用鳴寶丹亦效黃耆二兩甘草三錢白朮二兩金銀花二兩車前子五錢蛇床子五錢柴胡一錢肉桂一錢貝母一錢山茱萸一錢水煎服一劑消二劑愈加人參用之更妙秘訣肚癰須用鳴寶丹黃耆二兩草三錢術銀二兩車床五柴桂貝萸一錢添惡疽論人有四肢之間或頭面之上忽然生疽頭黑皮紫痛楚異常此陽症之毒也治不得法亦能殺人蓋陽症之毒其毒甚驟即用敗毒之藥治之可隨手而愈然而疽與癰實有不同癰潰於內而疽腫於外也潰於內者難於外治腫於外者易於內消雖癰疽之毒盡由內而發外無不可內治而外愈也而疽尤宜內治方用消疽湯夏枯草二兩忍冬藤二兩當歸二兩連翹三錢生地三錢地榆三錢天花粉三錢白芷二錢甘草二錢水煎服未潰者二劑即消已潰者四劑痊愈矣此方通治惡疽之方也凡生疽者以此方治之無不神效蓋補血散毒則血活而毒難留涼血清火則血寒而火易散疽多陽症所以治無不宜也秘訣消疽湯用夏枯草忍冬當歸二兩攪連翹二地粉三錢白芷二錢甘草好又治惡疽方荊芥三錢甘草三錢天花粉三錢當歸一兩玄參一兩金銀花八錢陳皮一錢蒲公英五錢牛蒡子二錢水煎服若在咽喉者加桔梗三錢若在下身者加地榆三錢秘訣又有一方治惡疽荊芥甘粉三錢許歸玄一兩銀八錢陳一英五二牛子若在咽喉三錢桔下身生兮加地榆疔瘡論人有生疔瘡者一時疼痛難忍此陽毒而非陰毒也但初生時人最難辨世人以生黃豆令病人口嚼不知辛生之味便是疔瘡此辨證之訣也其瘡頭必發黃泡或現紫黑之色更須細看泡中必有紅白一線通出於泡外大約疔生足上者紅線由足而入臍疔生手上者紅線由手而入心疔生唇上者紅線由唇而走喉如見此紅線透出即在紅線處用針刺出毒血以免毒攻心若現白線之絲則不必刺也治之法總以消毒瀉火為主方用拔疔散紫花地丁一兩菊花一兩水煎服一劑而紅線除二劑而疔毒散三劑痊愈矣若已潰爛亦用此方但加當歸二兩不必四劑毒盡而肉生矣秘訣方名拔疔只二味地丁菊花各兩配毒若初起服三劑已潰再加二兩歸此症用散疔散亦妙夏枯草一兩紫花地丁一兩連翹三錢水煎服一劑即削矣秘訣還有散疔亦效味枯草地丁一兩計連翹三錢一劑消何必瑣碎服三劑唇疔論人有生疔於唇上或在口角之旁或在上下唇之際不必論其大小皆因脾胃之火毒也最宜速散否則毒氣炎熾難於飲食往往有腐爛而死者然疔愈小而其毒愈橫也治之法宜急瀉火毒而又不可損傷脾胃之氣則毒不難散矣方用救唇湯金銀花一兩地丁一兩甘草一兩桔梗一兩知母一錢白果二十一個水煎服一劑而疼痛止二劑而瘡口消三劑痊愈未爛四劑已爛五劑收功矣此方治頭面上之疔瘡俱可獲效而治口唇之疔更為神驗白果桔梗善走口唇引銀花地丁至於生瘡之處則能盡解其毒也秘訣救唇湯能治唇疔銀丁兩用甘桔梗知錢白果二十一未爛四劑爛五功此症方用護唇湯亦效地丁一兩麥冬一兩玄參一兩夏枯草一兩甘草三錢水煎服二劑效秘訣又有療唇護吻湯地丁麥玄枯草兩再加三錢生甘草服止二劑妙非常鬢疽論人有兩鬢之中忽然生疽紅腫高突頭面眼鼻浮腫其狀不堪異乎尋常相貌此陽毒也蓋兩鬢近於太陽乃陽之位也陰氣不能至此部位兩鬢生疽當以陽症治之然而雖是陽症往往有變為陰症者故於陽藥中必須加入陰分之藥以防其變若以潰爛更須陰藥多於陽藥則消息而善治之也方用理鬢湯金銀花三兩白芷三錢當歸一兩川芎一兩夏枯草一兩水煎服未潰者二劑即消已潰者四劑即消矣此方用金銀花夏枯草以解火毒白芷川芎引入兩鬢太陽之間則金銀花夏枯草更得施其祛逐之功又妙在當歸之補氣血則陰陽雙益正足而邪散安得不速愈哉秘訣理鬢湯能治鬢疽銀花三兩芷三錢芎歸一兩氣血壯枯草一兩用水煎此症方用蒿草飲亦效青蒿一兩玄參一兩川芎一兩生地一兩夏枯草一兩細辛一錢蔓荊子一錢水煎服二三劑效秘訣蒿草飲是蒿玄芎生地枯草一兩同細辛蔓荊一錢許二劑三劑效無窮
