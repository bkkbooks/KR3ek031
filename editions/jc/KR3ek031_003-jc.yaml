body:
  text: 青囊秘訣下卷楊梅瘡論人有關心愛妓之歡戀爐酣戰自覺馬口如針刺之痛此毒氣已過也未幾而生魚口矣未幾而生疳瘡又未幾而遍身亦生瘡矣黃膿氾濫臭腐不堪人以為毒盛多用敗毒之藥誰知愈敗毒而瘡愈盛瘡愈多而愈不易愈往往有腐爛而死者實可傷也蓋楊梅之毒每中於泄精之時精泄則元氣虧虛故毒乘虛而入若元氣足則毒雖入而傳染不過輕微之毒可以一泄而愈今遍身瘡毒發出明是大虛之症而毒深中於內不補虛以泄毒焉能奏功倘用敗毒之藥無異下石矣方用二生湯土茯苓三兩生黃耆三兩生甘草三錢水煎服四劑瘡漸紅再四劑漸干又四劑痊愈矣服此方忌茶此方妙在不以解毒為事止用黃耆以補氣氣旺而邪自不留得生甘草以化毒而佐之以土茯苓以引毒毒去而正無虧蓋氣生而血不難養此治之巧者也偏德湯亦妙金銀花四兩當歸二兩白朮二兩土茯苓一兩天花粉三錢甘草五錢水煎服十劑愈秘訣二生湯能治楊梅土苓三兩生黃耆甘草三錢過十劑始紅漸干瘡可醫又有治梅銀四兩歸術二兩土茯兩花粉三錢五錢草服至十劑一掃光人有龜頭生疳乃服敗毒之藥欲毒小便而出若大腸燥結則攻毒之藥不能徑走大腸勢必盡趨膀胱而出蓋膀胱口細小便亦細毒難泄出於是毒不留於腸中而反結於外勢毒盛必發安得不腐爛哉往往有龜頭爛落連莖亦爛世人多以外藥敷之外藥固不可少然不先消其內之火毒而遽用外藥敷之不啻如石之壓草萌芽也勢必復發宜先用湯劑治之方名散毒丹土茯苓一兩黃柏一兩甘草一兩梔子炒研一兩肉桂一錢水煎服四劑則火自從小便而出疼痛少止然後用生勢丹敷之生勢丹兒茶一兩生甘草一兩炒黃柏三兩冰片三分硃砂一錢乳香三錢沒藥三錢大黃三錢研為細末磁瓷瓶收貯敷患處數日而膿盡血乾抹至一月肉筋再長而愈愈後宜大補氣血急用十全大補湯連服一二月則外勢仍能伸縮尚可種子否則多服敗毒之藥瀉火之劑則命門寒涼而外勢亦且冰冷安能陽和之驟復哉此前後治法之各異實有次序也秘訣龜頭腐爛散毒丹苓柏草梔一兩煎肉桂一錢四劑止然後再敷生勢丹生勢丹敷龜頭藥兒茶甘草一兩著炒柏三兩冰三分硃砂一錢乳沒藥大黃三錢共細末敷至一月患自瘥此症方用護身湯亦效玉米一兩金銀花一兩土茯苓一兩肉桂三分黃柏二錢車前子三錢水煎服連服十劑愈秘訣護身湯中玉米金茯苓一兩桂三分車前三錢黃柏二連服十劑可回春人有疳瘡初發魚口將生若不速治必遍身生瘡遷延歲月身體腐爛多不可救必須早治為妙然而早治之法世人多用五虎散敗毒雖毒從下泄而損傷元氣未為得法設或敗毒之藥少減又恐有留毒之虞亦非治法之妙蓋毒氣之入因元氣之虛也虛而敗毒是已虛而益虛也則毒將何以解乎治之法惟補中有泄則毒盡散而正氣又無虧矣方用早奪湯人參一兩白朮一兩當歸一兩黃耆一兩大黃一兩金銀花一兩土茯苓一兩石膏一兩甘草三錢遠志三錢天花粉三錢柴胡二錢水煎服一劑泄出惡物宜掘土埋之再服二劑而臭穢惡物無留於腸胃矣然後減去大黃石膏加土茯苓二兩同前藥再煎服四劑則一身上下與頭面之間必有隱隱瘡影現於皮膚之內再服二劑而瘡影亦盡消矣再服二劑則永不生瘡矣此方用大黃以瀉毒石膏以清毒甘草銀花以化毒柴粉以散毒又佐以大補氣血之藥有似三軍過勇士卒強健統帥大軍斬殺無遺則四野蕭條元氣盡矣用參耆歸術之類以至仁而佐至勇則剿撫兼施軍聲更振前徒倒戈自獲全勝少祛除則賊化為良豈敢仍為盜哉此方有益於風流子弟不少余實親視而實驗者也倘病人陰虛陽燥方中可加熟地數兩或加玄參一兩亦可余品不可亂加也秘訣參朮歸耆早奪湯大黃銀苓石膏兩甘草遠志粉三錢柴二一劑泄毒良再服四劑穢盡去土苓二兩去膏黃陰虛陽燥加玄地水煎服之妙難量方用泄穢丹亦妙蒲公英三兩金銀花三兩當歸一兩大黃五錢王不留三錢水煎服水十碗煎成二碗徐徐服秘訣泄穢神丹蒲公英銀花三兩歸兩從大黃五錢三不留十碗煎二徐服輕人有遍身生楊梅而服輕粉一時收斂以圖目前遮飾誰知毒藏於內必然外潰未幾而毒發於鼻自覺臭氣衝鼻而出又幾日而鼻色變黑不聞香臭矣此等症見必須急治否則鼻柱自傾一至腐爛便不可救然用些小之劑亦無益也蓋毒勢甚盛杯水難濟況楊梅結毒不結於他處而結於鼻中其毒更勝以毒不在他臟而在肺經也肺主氣者主清氣也毒氣非清氣可比毒氣在肺則清氣盡力毒氣矣肺氣出於鼻而藏於腎腎感毒氣移之於肺以散於皮膚則毒氣可以外出今用輕粉收斂則毒不得發於皮膚而盡歸還肺中肺欲歸還於腎而腎不受乃上衝於鼻矣鼻孔細小安能遽泄乎自然毒氣盡結於鼻而鼻乃獨受其禍矣治之法必須多用散藥以解毒然肺經之病不能直治必須隔一隔二治之而後可也方用護鼻散金銀花三兩玄參三兩麥冬二兩桔梗五錢甘草五錢天花粉五錢丹砂生沖一錢水煎調丹砂末服一劑而鼻知香臭矣服四劑而鼻黑之色去不必憂鼻之爛落矣更用全鼻散玄參一兩金銀花一兩當歸一兩丹砂一錢麥冬五錢人參三錢甘草三錢水煎服十劑而一身之毒盡出可保無虞前方過於勇猛所以救其急後方近乎和平所以補其虛而丹砂前後皆用者以輕粉之毒非丹砂不能去輕粉乃水銀所燒而丹砂乃水銀之母子見母自然相逢而不肯相離所以丹砂出而輕粉亦出此世人之所未知耳倘鼻梁已傾腐爛不堪宜以前護鼻散救之雖鼻不能重長而性命猶可保也秘訣護鼻解毒三銀參麥二梗五草花粉煮成丹砂生沖月民四劑色變莫憂心全鼻散藥玄金花一兩當歸錢丹砂麥冬五錢三參草連服十劑自無差方用寒水再造湯亦效麥冬三兩甘草二兩貝母三錢夏桔草二兩黃芩三錢連翹三錢桔梗三錢寒水石沖三錢赤茯苓二兩水煎服未爛者一劑可免爛者再劑不爛矣再二劑痊愈秘訣寒水再造三兩冬甘枯二兩赤茯苓貝母黃芩連翹桔寒水三錢煎成沖人有生楊梅遍身皆爛疼痛非常人以為毒氣之在皮膚也誰知是血虛而毒結於皮膚乎夫楊梅之毒散於骨髓之中毒在骨中難以療治而毒在皮膚似易於施治矣然毒未出於皮膚尚蘊藏於骨中泄骨中之毒可從下而外泄也如毒已出於皮膚其毒開張斂肌中之毒則不可由表而外攻矣得其法則易泄散未得其法則轉橫也治之法宜補虛以泄毒引毒從小便出乃得其治法耳方用二苓化毒湯白茯苓二兩土茯苓二兩當歸二兩紫草二兩金銀花二兩生甘草二錢水酒各半煎服十劑痊愈此方視之平淡無奇而實有異功者補以泄之也楊梅本生於腎之虛腎虛則血虛矣不補虛以治瘡反泄毒以耗血此世人治楊梅之瘡所以多不效耳加減二苓湯亦效生地一兩茯苓一兩當歸一兩黃耆二兩土茯苓二兩車前子五錢防風一錢水煎服二劑不痛再二劑痊愈矣秘訣二苓化毒茯苓歸紫草土茯銀二隨水酒煎服草二錢十劑痊愈效可推補虛瀉毒二苓湯生地茯苓歸一兩黃耆土茯二兩用牟前五錢一錢防腰疽論人有腰眼之間忽生疽毒疼痛呼號似乎陽症然而腰腎之處乃至陰之地未可作陽疽治之若竟陰症治之則亦不可也此症本於過忍其精欲泄不泄以成斯毒似乎純是陰分之過但腰間去腎不遠腎火發而成毒則陰中有陽未可能以陰症治之也必須合陰陽並治以化其毒則毒去如掃倘不補陰而竟治毒則腎氣愈傷而毒難速化矣蓋補陰而不補陽則陰無陽不生則毒深藏於腎宮而不得外泄矣然而陰陽兩治則腰腎之氣利而易奏功也方用兩治湯杜仲一兩當歸一兩白朮一兩防己三錢薟草三錢金銀花三兩甘草三錢水煎服一劑輕二劑而痛止三劑痊愈矣此方用白朮杜仲以利其腰臍氣通而毒自難結也又得銀花當歸之類補中有散而防己豨薟直入腎宮以祛逐蘊熱之毒則陰陽無偏勝之虞正有助而邪無紛爭自然三劑而成功也秘訣腰疽必須兩治湯杜歸白朮一兩添再加三錢防豨甘銀花三兩一齊煎此症用九靈丹亦效生地五錢丹皮五錢黑荊芥三錢甘草三錢防風一錢紫花地丁一兩山萸一兩炒白朮二兩熟地二兩水煎服連服二劑效秘訣又有腰疽九靈丹生地丹皮各五錢黑芥草三防風一地丁山萸一兩添惟有焦術熟地二連服二劑效如仙瘰癧論人有生痰塊於項頸堅如石者久則變成瘰癧流膿流血一塊未消一塊又長未幾又潰或耳下或缺盆或肩上有流行串走之狀故名鼠瘡又名串瘡言其如鼠之能穿也世人謂食鼠竊之物以成而不然也蓋瘰癧多起於痰而成於郁未有不鬱而能生痰者未有無痰而能成瘰癧者也世人多以開鬱消痰為治然郁久則氣血必耗耗則氣血更虧若徒消痰而不解鬱或但開鬱而不消痰是以虛而益虛也何能奏功余謂此症不若平肝而健脾助土木相調而愈矣方用清串湯白芍一兩白朮一兩柴胡二錢蒲公英三錢天花粉三錢茯苓五錢陳皮一錢附子一錢紫背天葵五錢甘草一錢水煎服六劑痰塊漸消再服十劑而瘰癧化盡再服一月痊愈愈後可服六君子湯數十劑以為善後之計永不再發也此方妙在蒲公英天葵為消串之神藥然非佐之以白芍柴胡則肝木不平非輔之以白朮茯苓則脾土不健何以能勝攻痰破塊之烈哉惟有攻有補則調劑咸宜更得附子之力以引群藥直搗中堅所以能愈宿疾沉疴於旦夕耳秘訣清串湯芍兩白朮柴二蒲粉三茯五陳皮附草一錢用紫背天葵五錢煮此症用康樂湯亦效白朮五錢茯苓五錢夏枯草五錢半夏三錢炒香附三錢白附子一錢甘草一錢陳皮一錢連翹二錢白芍一兩水煎服十劑痊愈秘訣康樂術苓枯草五制夏三錢炒香附白附草陳一錢用連翹二錢芍兩煮人有久生瘰癧兩項之間盡已潰爛串至胸膈之上無非痰塊亦已頭破而腐者遂至身體發熱發寒肌肉消瘦飲食少思自汗盜汗驚悸恍惚此等之症原系難治然治得法尚可救也大約瘰癧初起以解鬱消痰為主而佐之補虛以消其毒病久宜以補虛為君而佐之以解鬱消痰若徒以祛痰敗毒為事而不補氣血之虛鮮有不速之死矣方用轉敗湯人參一兩當歸一兩土炒白朮一兩金銀花三兩白芍三兩柴胡二錢製半夏五錢甘草三錢水煎服四劑胸開痰消再四劑而潰爛愈將前方減半再服十劑而痊愈矣此方補虛多於消痰解鬱中而寓化痰世人從未有知此治法者倘一於攻毒則愈攻而愈壞此方實祛病之仙丹而奪命之神品也秘訣參歸一兩土炒術銀芍三兩二錢胡制夏五錢三錢草八劑減半服十付此症用消瘰湯亦效熟附子三錢白朮一兩麥冬一兩菟絲子一兩白芍一兩天葵一兩人參五錢茯苓五錢甘草三錢貝母三錢水煎服十劑輕三十劑則痊愈矣秘訣消瘰三錢熟附子術兩麥冬菟絲子白芍天葵俱兩用參苓五錢三草貝頑瘡論人有患瘡經年累月而不愈者世所謂頑瘡也言其冥頑不靈無可如何之勢也然治之得法亦可取效蓋人氣血和平斷不生瘡即或生之治之亦易然則生瘡者乃氣血之不和也或因濕浸或因熱感或因寒邪之交遂至氣結而不宣血滯而不散結於皮而皮生瘡結於肉而肉生瘡日久不愈則膿血不淨而生蟲瘡口不收人以為蟲也服殺蟲之劑而反傷其皮肉且耗其氣血則氣血愈虛力難兼到棄皮肉於膜外而不顧斯瘡難痊遂成頑矣然治之者以行氣和血為主蟲與毒不計也但血不易和氣不易行非補養不能為功蓋氣得補而氣自行血得養而血自流矣方用救頑湯連翹一錢柴胡一錢防風一錢當歸一兩白朮一兩熟地一兩黃耆一兩麥冬一兩山萸五錢茯苓五錢製半夏二錢甘草三錢附子二錢水煎服二劑而瘡口必然發腫不可恐懼乃藥助氣血與瘡相戰也是速愈之機再服二劑不痛而癢矣再服二劑癢止而肉生再服二劑結而愈再服二劑永不再發矣此方專以活血行氣得補之道也氣行血活蟲將安在故不必殺蟲而頑瘡自除矣秘訣頑瘡連翹架錢防歸術地耆麥一兩萸苓五錢制夏二草三附子二錢襄二劑發腫四癢甚再服四劑效非常此症用轉神湯亦效人參五錢黃耆五錢當歸五錢麥冬五錢熟地五錢天花粉三錢天冬三錢車前子三錢白朮四錢甘草二錢荊芥一錢防己五分附子三分陳皮三分水煎服一劑知痛癢二劑大痛又連服數劑則潰去附子防己車前加山萸四錢五味子二錢再服四劑則愈矣秘訣轉種湯藥效可計歸參耆麥五熟地粉天車三術四錢草二荊一五分己附皮三分數付潰去附防車加萸味人有內股生瘡斂如豆許翻出肉一塊宛若菌狀人以為蟲食向外翻也誰知是肝經風熱血燥之故乎夫肝熱則生風乃內風而非外風也然外風而自覺清涼內風而實似蘊熱故外風宜散而內風宜清但清風而不補血則熱不能解而風亦不能舒也治之法必須養血清熱則火不燥而熱退則風自靜有何瘡之不愈乎方用清風湯白芍一兩川芎二錢人參五錢當歸五錢白朮三錢梔子三錢丹皮三錢天花粉三錢沙參三錢柴胡一錢甘草一錢連翹一錢水煎服連服數劑則瘡口自斂矣此方滋血以養肝非消肉以化毒何以瘡斂而愈也蓋瘡成於肝木之旺平肝則血無過燥之患自然風散熱退而無延燒之禍也若不平肝而內用降火之品外用退蝕之法則蟲反內蝕瘡肉肉愈損而元氣愈虛變出非常正難救援耳秘訣清風湯用芍一兩川芎二錢五參半術梔丹粉沙參三柴草連翹一錢嘗此症用斂內湯亦效金銀花一兩白芍一兩當歸一兩白朮五錢茯苓五錢生梔子三錢柴胡一錢甘草三錢水煎連服數劑秘訣斂內一兩銀芍歸術茯五錢三生梔柴一草三連劑服清熱養血治頑奇腳疽論人有腳趾上忽然發癢而後作痛指甲現黑色第二日連腳趾俱黑第三日連腳面俱黑黑至腿上過膝即死亦無名腫毒之一種也因人貪歡過服春藥是火熱之毒非腳疽可比若腳疽止黑在腳趾而不至腳面也然腳疽最凶雖不如無名腫毒之橫而殺人則一也蓋腳為四餘之末宜毒之所不到者也何以凶惡至此正以謂毒所不到之處而毒聚不散反出於腳趾之間則毒盛非常而治之不可輕視也然則用泄毒之藥治之可乎而孰知不然凡人身氣血周流上下則毒氣不能聚結於一處惟氣血虧損不能遍走經絡而火毒惡邪乃固結於骨節之際腳疽之生正因氣血之虧不能周流之故安可單泄其毒以再傷其氣血乎治之法必須大補氣血而佐以泄毒之品則安全之道也方用顧步湯牛膝一兩黃耆一兩石斛一兩當歸一兩金銀花三兩人參三錢水煎服一劑而黑色解二劑而疼痛止三劑愈若已潰爛多服數劑無不愈也此方用金銀花以解毒非用牛膝石斜則不能直達於腳趾非用人參歸耆亦不能使氣血流通以散毒也故用此方治腳疽多效即是無名腫毒用此方治之亦可得生世醫用刀割去腳趾亦是治法不若此方於補中散毒起死為生既無痛楚之傷又有全活之效也秘訣顧步湯藥治腳疽牛耆石斛一兩歸三兩銀花參三錢未潰三劑潰四奇本症用地丁飲亦效紫花地丁一兩甘菊花一兩牛膝一兩甘草五錢天花粉三錢水煎服未潰二劑已潰再服二劑收功多服為妙秘訣又有腳疽紫地丁甘菊牛膝一兩同甘草五錢粉三錢未潰二劑潰再功人有腳腿之上忽然腫起一塊皮色如常又不痛人以為癰疽也誰知是氣血大虛之故乎夫癰疽而皮色不變乃氣血之虛而曰非生癰也其誰信之嗟乎氣所以行血者也氣行則血行氣止則血止若氣血相活縱有邪氣亦難成腫邪氣之盛由於氣血之衰其腫為癰每每作痛而色必變為紅赤也然是癰也腫而不痛不赤皮色不變有腫名而無腫實純是氣虛而血無以養邪盛而氣不能制也治之法宜補氣以養血何必化毒以祛邪哉方用補中益氣湯白朮一兩黃耆一兩升麻五分柴胡一錢陳皮一錢茯苓三錢甘草二錢製半夏二錢人參五錢當歸五錢水煎服十劑而腫自消矣此方乃益氣之聖藥非消腫之神劑何以用之而腫即消也差真氣奪則虛邪氣盛則實真氣愈虛邪氣愈盛不能補氣之藥則氣何以能行腫何以能消哉蓋補中益氣湯善能補氣故能消腫何況又益以消腫去濕之品所以易於建功耳秘訣補中益氣兩術耆升麻五分錢柴陳冬三甘草制夏二參歸五錢十劑神又用下方亦效當歸五錢人參五錢黃耆一兩牛膝五分荊芥三錢茯苓三錢天花粉三錢附子三錢甘草一錢水煎服秘訣還有五錢當歸參一兩黃耆牛五分荊芥苓粉俱三錢附子三錢草錢存痔漏論人有肛門內外四旁忽然生長紅瘰先癢後痛漸漸成痔日久不愈此症皆由濕熱所成也多因地氣之濕加以嗜飲酒熱之毒所以結於肛門邊而不能遽化矣夫肛門通於大腸若內有濕熱宜從大腸而出何以結而成痔以濕熱在大腸不能久留勢必盡趨於肛門而肛門乃大腸之鎖鑰未免有開閉防範之意不容濕熱出於其外則蓄積日久而濕熱之毒肛門獨受其害矣雖有內痔外痔之殊而其為濕毒則一也治之法何能捨濕毒而他求乎肛門雖去脾胃甚遠而化濕熱之毒則不能不假道於脾胃肛門未受其益而脾胃先受其損所以多無成功也故用藥必須無損於脾胃而有益於肛門治之始能奏功也方用益後湯山藥一兩茯苓一兩白芍一兩玉米一兩地榆三錢山甲炒一片水煎服四劑寬快再四劑愈後將此方每味加十倍研末煉蜜為丸梧子大空心開水送服五錢服完即愈此方利水清熱無傷於脾胃而有益於肛門兩全之道也秘訣內外生痔益後湯山藥茯苓芍兩襄玉米一兩地榆三山甲一片土炒黃四劑寬快再四愈加倍研末蜜丸嘗此症用榆槐飲亦效槐米二錢地榆三錢茯苓三錢車前子三錢水煎服四劑痊愈秘訣榆槐飲中藥四味槐米二錢三地榆茯苓車前亦用三四劑痊愈無容慮人有肛門先因有痔瘡因不慎酒色遂至腐爛變成漏瘡不能收口生長肉管流膿淌血甚以為苦醫人治法多用刀針掛線徒受苦楚內毒未除外口難長經年累月不能奏功蓋肛門之肉不比他處之肉非橫生則縱生也而肛門之肉有縱有橫最難生合況大便不時經過又易損傷然經刀針掛線是已傷而益傷安能遽長皮肉乎故刀線不可輕用惟消其濕熱之毒內治為佳然漏生既久氣血必虛徒事止漏反傷氣血亦難奏功也方用青龜丸烏龜一個茯苓五兩薏苡仁四兩羊蹄後爪四對土炒山甲五錢人參二兩黃耆八兩當歸三兩白芷二兩槐米二兩瓦松二錢干青苔一兩共研末將烏龜用石臼搗死同藥拌勻鍋內蒸熟焙乾為末煉蜜為丸梧子大每早開水送服三錢服至半月漏自干連服兩月而漏痂滿一料服完痊愈必須嚴戒酒色三月不然不能奏功此方去濕而不散氣散毒而不損血補漏於無形填隙於有孔願人堅持三月酒色之戒以去十年之病也秘訣青龜丸用苓薏仁羊蹄後爪山甲參耆八歸三芷槐二瓦松二錢苔兩斟人有大便時先射出血而後便糞人以為便血之病也誰知是肛門內生血痔乎夫痔久必變為漏宜流膿血但人之受病不同而見症亦異此症得於多飲燒酒釀成熱毒走於直腸不得連泄乃結成小痔而不化久則皮破血流此乃血出於直腸之外非出血直腸之中乃膀胱之血也膀胱化氣而不化血酒毒滲入膀胱則酒氣化水出於陰器酒毒燥血無路可出而毒結於直腸之外毒而內攻而直腸之痔生矣然生痔必有其隙可乘而膀胱之血注之久且以血引血不獨膀胱之血盡歸之矣乘大便之開閉血先奪門而出故從大便而直射正見其欲出之速耳治法似宜急杜其血隙使之無出路為第一策然私竇既開漏血易泄不急清其上游之源而但截其下流之隙非計之善也方用清源散全蠍二兩土炒山甲二兩珍珠豆腐煮三錢瓦松一條研末每日開水調一茶匙服之服至一月即效如不願調服用米飯搗爛為丸梧子大每日開水送下二十丸服時必須戒酒色秘訣清源全蠍用二兩山甲亦二上炒黃珍珠三錢豆腐煮瓦松一條陰乾嘗每日開水調茶匙服至一月妙無方又方茯苓五錢白芍五錢白朮五錢白芷三錢槐花三錢人參三錢地榆三錢黃連三錢車前子二錢葛根二錢三七參二錢穿山甲研沖一錢水煎調山甲三七參末沖服三劑血減去黃連再三劑則愈矣嚴戒酒色三月可痊此方妙在以黃連解酒熱之毒所謂先清其源也蓋上游無病而下流自安況諸藥分配得宜無非去濕化熱之味堵塞有方何患洪水沖決哉秘訣肉痔苓芍術五錢芷槐三錢參榆連車葛二錢三七參一錢山甲沖服安三劑去連再三劑嚴戒酒色乃可痊方用止射丹亦效黃芩三錢槐花三錢荊芥三錢瓦松一條生地一兩當歸一兩水煎服連服四劑則血乾矣或此方加十倍研末煉蜜為丸梧子大每服三錢徐徐自愈秘訣又有一名止射丹芩槐荊芥俱三錢瓦松一條地歸兩連服四劑血自干大腸癰論人有腹中痛甚手不可按而右足屈而不伸者人以為腹中火盛而存食也誰知是大腸生癰乎夫腹痛而足不能伸者俱是腸內生癰而大腸生癰則足尤不能伸也惟是大腸生癰亦自有故無不成於火火盛而不散則鬱結而成癰矣然火之有餘實本於水之不足水衰則火旺火旺而無制乃養成其毒而不可解治之法必須壯水以制火則毒消而癰愈矣方用清腸飲元參一兩地榆一兩麥冬一兩金銀花三兩當歸二兩甘草三錢薏苡仁五錢黃芩二錢水煎服一劑而痛少止二劑而足可伸再二劑而毒盡消矣此方純是潤腸之品又是活血解毒之味雖泄火而實滋陰所以相濟而相成取效如神耳倘不益陰以潤腸而惟攻毒以降火則大腸先損又何能勝火毒之凌爍哉勿怪愈治而愈不效也秘訣清腸飲藥治腸癰元參一兩榆麥冬銀三歸二草三錢薏五芩二四劑從本症用兩間湯亦佳玉米二兩當歸二兩槐花三錢天花粉三錢錦地羅一兩地丁五錢甘草八錢水煎服一劑減二劑愈秘訣兩間湯用玉米歸槐粉三錢一兩錦地丁五錢八錢草二劑神妙去其根又方人參一兩當歸二兩生地五錢甘草五錢錦地羅五錢地榆三錢天花粉三錢黃芩二錢秘訣救胃參兩二兩當生地甘羅五錢襄榆粉三錢黃芩二一劑能食否不詳人有大腸生癰右足不能伸腹中痛甚便出膿血肛門如刀之割此腸癰已潰爛也能食者生不能食者死因火毒熾盛而不能飲食者正可棄之而不救也然不能食者之中亦有非因火毒之熾而然也則又不可因其不能食而棄之也凡癰疽之症均以有胃氣為佳故治癰疽以扶胃氣為第一義而少加敗毒化膿之味則正氣不傷而火毒易散也今大腸癰潰不思飲食則胃氣已盡絕大危之症也若不急補胃而惟治癰必死之道也方用腸癰潰爛湯人參一兩玉米一兩白朮一兩山藥一兩元參一兩甘草三錢金銀花四兩山羊血一錢水煎服服藥時衝入山羊血一劑胃氣開二劑膿少三劑痛止四劑痊愈此方全在救胃而敗毒祛膿已在其中矣妙在金銀花雖是治毒之品而仍乃滋陰之藥為瘡家奪命之將軍乃至仁至勇之師又得參朮以助其力則散毒尤神山羊血止血消濁且善通氣引諸藥直入癰以解散之乃嚮導之智者也合而治之則調合有人撫綏有人攻剿有人安得不奏功如神乎自然胃氣大開化精微而輸於大腸也倘胃氣未傷服之尤奏功如響萬勿疑畏而不敢用枉人性命耳秘訣腸癰潰爛便膿血參玉術藥元兩接甘草三錢銀四兩臨服衝入山羊血人有大腸生癰少腹痛甚淋漓不止精神減少飲食無味面色痿黃四肢無力自汗盜汗夜不能寐者人以為火盛生癰也誰知是水衰不能潤腸乎夫大腸之所以能傳導者全賴腎水之灌注也今因醉飽房勞過傷精力遂至火動水涸又兼生冷並進以致氣血乖違濕動痰生腸胃痞塞運化不通氣血凝滯結而成癰也然則生癰之前亦本乎腎水之不足而潰爛之後又複流其穢水是因虛而益虛矣若作火毒治之鮮不變為死症必須大補其腎水而並補其脾胃之氣則脾胃化精生水庶枯涸之腸一旦得滂沱之潤自然饜足而重蘇正不必治癰而惟補氣氣血足而肌肉自生矣方用加味六味地黃湯山藥八錢山萸八錢生地二兩黃耆一兩澤瀉一錢人參一兩麥冬一兩茯苓三錢丹皮六錢水煎服連服數劑腹痛止而精神健則愈矣此方六味以補腎水加人參麥耆以補脾胃之土土旺而肺氣自旺肺與大腸相表裡且又為腎之母自然子母相需表裡相應故奏功如神也秘訣加味六味山山地耆澤參麥苓丹皮連服四劑腹痛止精神而健則愈矣方用加味壯水湯亦治之元參二兩生地二兩麥冬一兩甘菊花一兩山萸一兩蒲公英五錢五味子二錢貝母二錢水煎服再劑去蒲公英元參加茯苓五錢人參五錢秘訣加味壯水二元地麥菊山萸一兩備蒲公五錢味貝二再去英元苓參配小腸癰論人有腹痛口渴左足屈而不伸伸則痛甚手按其痛處更不可忍者人以為腹中生癰也誰知是小腸癰乎腸中生癰不同有大小腸之分屈右足者大腸生癰屈左足者小腸生癰也今屈而不伸者既在左足是癰生於小腸而非生於大腸矣惟是大腸之癰易治小腸之癰難醫以大腸可泄而小腸難泄也若得其法又何難哉蓋大腸可泄其火從糟粕而出小腸可泄其火從溲溺而泄也方用泄毒至神湯劉寄奴三兩車前子三兩金銀花三兩澤瀉三兩甘草三兩茯苓一兩玉米一兩肉桂一分水煎服一劑而水如注二劑而痛頓止三劑而症如失不必四劑矣此方皆利水之藥重用金銀花為消毒之品何以建功之神如此蓋小腸之毒必須內消而內消之藥舍金銀花實無他藥可代以他藥消毒均能損傷正氣而小腸之氣斷不可損傷故必須以金銀花為君藥但金銀花不能入於小腸之中而佐以茯苓車前澤瀉玉米之類引入小腸又加肉桂一分得其氣味直入膀胱從溲溺而化其毒若恐火毒太甚諸藥不能迅速收功更加寄奴之速法甘草之緩調剛柔遲速兼而行之既無留滯之虞又無峻烈之害自然火毒盡從小腸膀胱而出也秘訣泄毒至神寄奴三車銀草澤重如前苓玉一兩桂分入三劑服後患可痊此症方用王公湯亦效王不留一兩蒲公英一兩車前子一兩甘草五錢金銀花三兩水煎服一劑效秘訣王公湯治小腸癰不留一兩蒲公英車前一兩五錢草銀花三兩一劑從人有腹痛呼號不已其痛卻在左腹按之痛不可忍不許人按人以為食積在大腸也誰知是小腸之生癰乎夫腸癰必屈其足而今不屈足似非腸癰之病然腸癰生於腸內在大腸者屈右足而不伸在小腸者屈左足而不伸也若癰生於腸外者皆不屈足痛在左則小腸生癰痛在右則大腸生癰也至於食積燥糞之痛時而痛時而不痛不若生癰之痛有定而不移常痛而無止息也大小腸生癰於腸內尚可破潰而大小腸生癰於腸外斷不可使之潰爛者以腸外無可出之路皆必死之症也而小腸更甚必須急治以利水解毒為妙否則變生不測矣方用利水解毒內消丹亦可用王公湯再加金銀花三兩可矣金銀花四兩車前子五錢薏苡仁一兩茯苓一兩當歸二兩甘草三錢水煎服一劑而痛大減二劑而痛又減三劑而痛全止四劑而痊愈矣此方即前方泄毒至神湯之變方也但前方於利水之中而行其敗毒之法此方則於利水之中而佐以補血敗毒之味也蓋癰破尤宜利水利水則毒隨之而出易於滌除如癰未破而不補血徒事利水利水則水泄血虛毒亦難於消化同中之異不可不知也然此症須急早治之否則癰雖愈而瘀血流於腸外必有終身腹痛之患矣秘訣利水解毒內消丹銀花四兩車五錢薏仁苓兩歸二兩甘草三錢一同煎人有腹痛驟甚小便流血左足不能伸者人以為小腸生癰也誰知是小腸之火太盛乎夫小腸生癰必屈左足今左足不伸明是生癰之證而余獨謂是火盛者何也蓋生癰必有其微豈有一旦驟生而流血者乎癰久而膿生膿欲盡而血出豈有不潰不爛而先出血者乎然左足之屈則又何也蓋小腸與大腸不同小腸細而大腸寬寬者可以容邪而細則難以容邪此必然之理也小腸受火煎熬則腸中逼迫不能舒暢而左足應之故暫屈而不能伸不若生癰者長屈而不能伸也萬不可因足之不伸即信是癰而妄用解毒之藥其害大矣然火毒與癰從何而辨之初病之時辨其小便之有血無血耳如初痛而足不伸小便無血乃是生癰初痛而足不伸小便有血乃是火痛斷不差也治之法泄其火邪不必化毒則痛自止而足自伸矣方用加味小柴胡湯治之柴胡二錢黃芩三錢人參五錢茯苓五錢半夏一錢甘草一錢生薑三片大棗三枚水煎服一劑而足伸二劑而血止腸亦不痛矣小柴胡湯非治小腸癰之藥也何以用之而效驗之捷如此蓋小腸之火盛者起於肝木之郁也木鬱則火生不敢犯心而犯小腸耳夫火性炎上今不上炎而反致下熾拂其火之性矣此小腸所以受害而作痛也至於血流於小便中者又是何故蓋小腸之血為火所逼恐火爍血乾故越出於小腸之外直走膀胱反使水道不行而流血也小柴胡湯既舒其肝膽之氣則上炎之火氣其性即順而不逆也又得茯苓以分消其水氣則水順流而不橫其血歸經而不逆自然氣舒血和而消毒矣此方之所以奇耳秘訣加味小柴治腸毒黃芩三錢參芩五夏草一錢加薑棗二劑血止腸癰主此症用車苓連甘湯亦效車前子五錢茯苓一兩黃連三錢甘草三錢水煎服秘訣又有車苓連甘湯車前五錢苓兩襄甘連三錢同煎服止血通和此方良
