front:
  text: 序青囊秘訣余閱之未知其果效與否而其議論純正望之而知為異書也因揮汗抄錄帶入都門試之對口痔漏等症無不應手而愈雖扁盧神術無逾乎此潘子原本失其姓氏書傳而人不傳是誰之咎余聞君子不沒人善異日者當以無名氏青囊秘訣弁其眉而付諸梓頭大清雍正元年歲次癸卯巧月帆川王大德撰於金堂之旅次河南懷慶濟源廟道張干學秘藏
